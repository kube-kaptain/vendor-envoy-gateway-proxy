# Source: gateway-helm/templates/infra-manager-rbac.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vendor-envoy-gateway-infra-manager
  namespace: '${Environment}'
  labels:
    helm.sh/chart: gateway-helm-1.7.1
    app.kubernetes.io/name: gateway-helm
    app.kubernetes.io/upstream-instance: vendor-envoy-gateway
    app.kubernetes.io/instance: ${ProjectName}
    app.kubernetes.io/upstream-version: "1.7.1.8"
    app.kubernetes.io/version: "${Version}"
    app.kubernetes.io/managed-by: Kaptain
    kaptain.org/environment: ${Environment}
  annotations:
    kaptain.org/environment: ${Environment}
    app.kubernetes.io/managed-by: Kaptain
    app.kubernetes.io/upstream-version: 1.7.1.8
    app.kubernetes.io/version: "${Version}"
rules:
  - apiGroups:
      - ""
    resources:
      - serviceaccounts
      - services
      - configmaps
    verbs:
      - create
      - get
      - list
      - delete
      - deletecollection
      - patch
  - apiGroups:
      - apps
    resources:
      - deployments
      - daemonsets
    verbs:
      - create
      - get
      - delete
      - deletecollection
      - patch
  - apiGroups:
      - autoscaling
      - policy
    resources:
      - horizontalpodautoscalers
      - poddisruptionbudgets
    verbs:
      - create
      - get
      - list
      - delete
      - deletecollection
      - patch
  - apiGroups:
      - certificates.k8s.io
    resources:
      - clustertrustbundles
    verbs:
      - list
      - get
      - watch
