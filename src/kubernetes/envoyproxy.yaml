apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: ${ProjectName}
  namespace: ${Environment}
  labels:
    app.kubernetes.io/managed-by: Kaptain
    app.kubernetes.io/instance: ${ProjectName}
    app.kubernetes.io/version: "${Version}"
    kaptain.org/environment: ${Environment}
    kaptain.org/version: "${Version}"
    kaptain.org/project-name: ${ProjectName}
  annotations:
    app.kubernetes.io/managed-by: Kaptain
    app.kubernetes.io/version: "${Version}"
    kaptain.org/environment: ${Environment}
    kaptain.org/version: "${Version}"
    kaptain.org/project-name: ${ProjectName}
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: ${VendorEnvoyGatewayProxy/Replicas}
        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: ${VendorEnvoyGatewayProxy/RollingUpdateMaxSurge}
            maxUnavailable: ${VendorEnvoyGatewayProxy/RollingUpdateMaxUnavailable}
        container:
          image: ${VendorEnvoyGatewayProxy/EnvironmentDockerRegistryAndNamespace}/${DockerImageName}:${DockerTag}
          resources:
            requests:
              cpu: ${VendorEnvoyGatewayProxy/CpuRequest}
              memory: ${VendorEnvoyGatewayProxy/Memory}
            limits:
              memory: ${VendorEnvoyGatewayProxy/Memory}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
        pod:
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "19001"
            prometheus.io/path: "/stats/prometheus"
            kaptain.org/environment: ${Environment}
            kaptain.org/version: "${Version}"
            kaptain.org/project-name: ${ProjectName}
          labels:
            kaptain.org/environment: ${Environment}
            kaptain.org/version: "${Version}"
            kaptain.org/project-name: ${ProjectName}
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        gateway.envoyproxy.io/owning-gateway-name: ${ProjectName}
                    topologyKey: kubernetes.io/hostname
                - weight: 50
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        gateway.envoyproxy.io/owning-gateway-name: ${ProjectName}
                    topologyKey: topology.kubernetes.io/zone
          tolerations: []
      envoyService:
        type: ClusterIP

  # --- Worker threads ---
  concurrency: ${VendorEnvoyGatewayProxy/Concurrency}

  # --- Graceful shutdown ---
  #
  # The pod's terminationGracePeriodSeconds is not user-configurable; the controller
  # derives it as drainTimeout + 300s (5 min safety cushion) and does not accept it
  # as input in the CRD.
  #
  # Refs (https://github.com/envoyproxy/gateway, accurate as of v1.7.1)
  # - internal/infrastructure/kubernetes/proxy/resource_provider.go:614 expectedTerminationGracePeriodSeconds
  # - internal/infrastructure/kubernetes/proxy/resource_provider.go:422 PodSpec assignment
  # - api/v1alpha1/envoyproxy_types.go:442                              ShutdownConfig (only DrainTimeout + MinDrainDuration)
  #
  # Note: Line numbers and behaviour may drift in future versions!
  shutdown:
    drainTimeout: ${VendorEnvoyGatewayProxy/ShutdownDrainTimeout}
    minDrainDuration: ${VendorEnvoyGatewayProxy/ShutdownMinDrainDuration}

  # --- Access logging ---
  telemetry:
    accessLog:
      settings:
        - format:
            type: JSON
            json:
              start_time: "%START_TIME%"
              method: "%REQ(:METHOD)%"
              path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
              protocol: "%PROTOCOL%"
              response_code: "%RESPONSE_CODE%"
              response_flags: "%RESPONSE_FLAGS%"
              bytes_received: "%BYTES_RECEIVED%"
              bytes_sent: "%BYTES_SENT%"
              duration: "%DURATION%"
              upstream_host: "%UPSTREAM_HOST%"
              upstream_cluster: "%UPSTREAM_CLUSTER%"
              x_forwarded_for: "%REQ(X-FORWARDED-FOR)%"
              user_agent: "%REQ(USER-AGENT)%"
              request_id: "%REQ(X-REQUEST-ID)%"
          sinks:
            - type: File
              file:
                path: /dev/stdout
    metrics:
      prometheus:
        disable: ${VendorEnvoyGatewayProxy/PrometheusMetricsDisable}
      sinks: [${VendorEnvoyGatewayProxy/MetricsSinks}]
  logging:
    level:
      default: ${VendorEnvoyGatewayProxy/LoggingLevel}
